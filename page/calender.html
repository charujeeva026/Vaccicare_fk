<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VacciCare - Vaccine Calendar</title>
  <link rel="stylesheet" href="../css/calender.css">
</head>

<body>

<header>
  <div class="logo">VacciCare</div>
  <div class="header-title">Vaccine Calendar</div>
  <div class="profile-icon"></div>
</header>

<div class="container">

  <nav class="sidebar">
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="../page/new_hospital.html">Hospital</a></li>
      <li><a href="../page/new_dash.html">Dashboard</a></li>
      <li><a href="../page/calender.html">Vaccine Calendar</a></li>
      <li><a href="../page/guideness.html">Health Guidelines</a></li>
      <li><a href="../page/vaccine.html">Add vaccine</a></li>
      <li><a href="../page/profile.html">Profile</a></li>
    </ul>
  </nav>

  <main class="content">

    <h2>Vaccine Calendar Reminder</h2>

    <!-- Vaccine Dropdown (From DB) -->
    <select id="vaccineSelect" class="vaccine-select">
      <option value="">Select a vaccine</option>
    </select>

    <img
      src="../Assets/pregnant-woman-counting-down-delivery-date.jpg"
      alt="Calendar Image"
      class="calendar-image"
    />

    <div class="vaccine-details">

      <h3>Vaccine Details</h3>

      <form class="vaccine-form">

        <label>Vaccine Name</label>
        <input type="text" id="vaccineName" placeholder="Enter vaccine name">

        <label>Date</label>
        <input type="date" id="vaccineDate">

        <label>Notes</label>
        <textarea id="notes" placeholder="Enter notes"></textarea>

        <button type="button" id="setReminderBtn" class="btn">
          Set Reminder
        </button>

      </form>

    </div>

  </main>

</div>

<footer>
  <div class="footer-links">
    <a href="../page/about.html">About</a>
    <a href="../page/contact.html">Contact</a>
  </div>
  <p>&copy;2026 VacciCare</p>
</footer>

<script src="../js/calendar.js"></script>

</body>
</html>
